global
    maxconn 8192
    nbthread 1
    tune.bufsize 4096
    tune.maxrewrite 1024

defaults
    mode http
    no log
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 2s
    option http-keep-alive
    option dontlognull

frontend fe
    bind *:9999 backlog 65535
    default_backend be

backend be
    balance roundrobin
    option http-keep-alive
    http-reuse always
    option httpchk GET /ready
    server api1 /tmp/sockets/api-1.sock check inter 100ms rise 1 fall 2
    server api2 /tmp/sockets/api-2.sock check inter 100ms rise 1 fall 2
