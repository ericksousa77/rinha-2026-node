services:
  haproxy:
    image: haproxytech/haproxy-alpine:3.2
    platform: linux/amd64
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - sockets:/tmp/sockets
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 30M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  api1:
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:-24}
    platform: linux/amd64
    environment:
      NODE_ENV: production
      RINHA_RESOURCES_DIR: ./data
      RINHA_SEARCH_BACKEND: ${RINHA_SEARCH_BACKEND:-hnsw}
      RINHA_HNSW_EF_SEARCH: ${RINHA_HNSW_EF_SEARCH:-120}
      RINHA_HNSW_EF_CONSTRUCTION: ${RINHA_HNSW_EF_CONSTRUCTION:-200}
      RINHA_HNSW_M: ${RINHA_HNSW_M:-16}
      RINHA_HNSW_RANDOM_SEED: ${RINHA_HNSW_RANDOM_SEED:-100}
      RINHA_UNIX_SOCKET_PATH: /tmp/sockets/api-1.sock
    volumes:
      - sockets:/tmp/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 160M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  api2:
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:-24}
    platform: linux/amd64
    environment:
      NODE_ENV: production
      RINHA_RESOURCES_DIR: ./data
      RINHA_SEARCH_BACKEND: ${RINHA_SEARCH_BACKEND:-hnsw}
      RINHA_HNSW_EF_SEARCH: ${RINHA_HNSW_EF_SEARCH:-120}
      RINHA_HNSW_EF_CONSTRUCTION: ${RINHA_HNSW_EF_CONSTRUCTION:-200}
      RINHA_HNSW_M: ${RINHA_HNSW_M:-16}
      RINHA_HNSW_RANDOM_SEED: ${RINHA_HNSW_RANDOM_SEED:-100}
      RINHA_UNIX_SOCKET_PATH: /tmp/sockets/api-2.sock
    volumes:
      - sockets:/tmp/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 160M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
